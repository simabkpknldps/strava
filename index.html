<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Rekap Aktivitas Kamis Strava</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #fc4c02; color: white; }
    </style>
</head>
<body>

    <h2>Rekap Aktivitas Hari Kamis</h2>
    <button onclick="fetchStravaData()">Muat Aktivitas Kamis</button>

    <table id="rekapTable">
        <thead>
            <tr>
                <th>Nama Anggota</th>
                <th>Jenis Aktivitas</th>
                <th>Jarak (km)</th>
                <th>Durasi (menit)</th>
            </tr>
        </thead>
        <tbody id="dataBody">
            </tbody>
    </table>

    <script>
        async function fetchStravaData() {
            // Catatan: Anda perlu mengganti URL ini dengan endpoint API Strava Anda
            // atau backend proxy yang menangani OAuth Strava.
            alert("Membutuhkan integrasi API Strava dengan Access Token.");
            
            // Contoh struktur data yang akan diproses:
            const data = [
                { nama: "Budi", tipe: "Run", jarak: 5.2, durasi: 30 },
                { nama: "Siti", tipe: "Ride", jarak: 25.0, durasi: 60 }
            ];

            const tbody = document.getElementById('dataBody');
            data.forEach(item => {
                let row = `<tr>
                    <td>${item.nama}</td>
                    <td>${item.tipe}</td>
                    <td>${item.jarak}</td>
                    <td>${item.durasi}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }
    </script>
</body>
</html>
